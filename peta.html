<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Informasi Perumahan Kota Banda Aceh</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

body{
    background:#f5f7fa;
}

header{
    position:relative;
    background:#0f4c81;
    color:#fff;
    text-align:center;
    padding:16px;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
    z-index:1000;
}

header h1{
    font-size:24px;
    font-weight:700;
}

.toolbar{
    position:absolute;
    left:15px;
    top:15px;
}

.back-btn{
    display:inline-block;
    padding:10px 18px;
    border-radius:30px;
    background:#fff;
    color:#0f4c81;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
    background:#1976d2;
    color:white;
}

#map{
    width:100%;
    height:calc(100vh - 72px);
}

.floating{
    position:absolute;
    top:90px;
    right:20px;

    width:350px;
    max-width:95%;

    background:white;
    border-radius:12px;

    overflow:hidden;

    box-shadow:0 8px 25px rgba(0,0,0,.35);

    display:none;

    z-index:9999;
}

.fh{
    background:#0f4c81;
    color:white;
    padding:15px;
    font-size:18px;
    font-weight:600;
}

.close-btn{
    float:right;
    border:none;
    background:none;
    color:white;
    cursor:pointer;
    font-size:22px;
}

.fb{
    padding:15px;
}

.fb table{
    width:100%;
    border-collapse:collapse;
}

.fb td{
    padding:6px;
    vertical-align:top;
}

.form-button{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-top:15px;
}

.form-button button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#0f4c81;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
}

.form-button button:hover{
    background:#1976d2;
}

@media(max-width:768px){

header h1{
    font-size:18px;
    line-height:1.4;
}

#map{
    height:calc(100vh - 66px);
}

.toolbar{
    position:relative;
    left:0;
    top:0;
    margin-bottom:10px;
}

.back-btn{
    font-size:14px;
    padding:8px 14px;
}

.floating{
    left:10px;
    right:10px;
    width:auto;
    top:auto;
    bottom:15px;
}

.form-button{
    grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<header>

<div class="toolbar">
<a href="index.html" class="back-btn">
🏠 Beranda
</a>
</div>

<h1>Sistem Informasi Perumahan Kota Banda Aceh</h1>

</header>

<div id="map"></div>

<div id="popup" class="floating">

<div class="fh">

🏠 DUSUN REMAJA

<button
class="close-btn"
onclick="document.getElementById('popup').style.display='none'">
✕
</button>

</div>

<div class="fb">

<table>

<tr>
<td><b>Kecamatan</b></td>
<td>LUENG BATA</td>
</tr>

<tr>
<td><b>Gampong</b></td>
<td>COT MESJID</td>
</tr>

<tr>
<td><b>Dusun</b></td>
<td>REMAJA</td>
</tr>

<tr>
<td><b>Luas</b></td>
<td>13.87 Ha</td>
</tr>

<tr>
<td><b>ID_DSN</b></td>
<td>1171012007001</td>
</tr>

</table>

<div class="form-button">

<button>Form 4.A.4</button>

<button>Form 4.A.10</button>

<button>Form 4.A.11</button>

<button>Form 4.A.12</button>

</div>

</div>

</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =========================
// Inisialisasi Peta
// =========================

const map = L.map("map",{
    zoomControl:false
}).setView([5.5483,95.3238],13);

L.control.zoom({
    position:"bottomright"
}).addTo(map);

// =========================
// Basemap
// =========================

L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        attribution:"© OpenStreetMap",
        maxZoom:19
    }
).addTo(map);


// =========================
// Floating Popup
// =========================

const popup=document.getElementById("popup");

function hidePopup(){
    popup.style.display="none";
}

document.querySelector(".close-btn")
.addEventListener("click",hidePopup);

document.addEventListener("keydown",e=>{
    if(e.key==="Escape") hidePopup();
});


// =========================
// Fungsi Menampilkan Informasi
// =========================

function showDusunInfo(feature){

    const p=feature.properties;

    // Judul popup
    document.querySelector(".fh").innerHTML=
    `🏠 ${p.DUSUN}
    <button class="close-btn">✕</button>`;

    document.querySelector(".fh .close-btn")
    .addEventListener("click",hidePopup);

    // Isi tabel
    document.querySelector(".fb").innerHTML=`

    <table>

    <tr>
        <td><b>Kecamatan</b></td>
        <td>${p.KECAMATAN}</td>
    </tr>

    <tr>
        <td><b>Gampong</b></td>
        <td>${p.GAMPONG}</td>
    </tr>

    <tr>
        <td><b>Dusun</b></td>
        <td>${p.DUSUN}</td>
    </tr>

    <tr>
        <td><b>Luas</b></td>
        <td>${Number(p.Ha).toFixed(2)} Ha</td>
    </tr>

    <tr>
        <td><b>ID Dusun</b></td>
        <td>${Math.round(p.ID_DSN)}</td>
    </tr>

    </table>

    <div class="form-button">

        <button onclick="openForm('4a4','${Math.round(p.ID_DSN)}')">
        Form 4.A.4
        </button>

        <button onclick="openForm('4a10','${Math.round(p.ID_DSN)}')">
        Form 4.A.10
        </button>

        <button onclick="openForm('4a11','${Math.round(p.ID_DSN)}')">
        Form 4.A.11
        </button>

        <button onclick="openForm('4a12','${Math.round(p.ID_DSN)}')">
        Form 4.A.12
        </button>

    </div>

    `;

    popup.style.display="block";

}


// =========================
// Tombol Form
// =========================

function openForm(form,id){

    // nanti diarahkan ke halaman masing-masing
    // contoh:
    // form44.html?id=117104200401

    window.location.href=
        `${form}.html?id=${id}`;

}


// =========================
// Style Polygon
// =========================

function styleDusun(feature){

    return{

        color:"#0055cc",
        weight:2,
        fillColor:"#2E8B57",
        fillOpacity:0.45

    };

}


// =========================
// Highlight
// =========================

function highlight(e){

    e.target.setStyle({

        weight:3,
        color:"#ff9900",
        fillOpacity:0.75

    });

}

function reset(e){

    dusunLayer.resetStyle(e.target);

}


// =========================
// Event Layer
// =========================

function onEachDusun(feature,layer){

    layer.on({

        mouseover:highlight,

        mouseout:reset,

        click:function(e){

            showDusunInfo(feature);

            map.fitBounds(layer.getBounds());

        }

    });

}


// =========================
// Load GeoJSON Dusun
// =========================

let dusunLayer;

fetch("geojson/dusun.geojson")
    .then(response => {

        if (!response.ok) {
            throw new Error("GeoJSON tidak ditemukan");
        }

        return response.json();

    })

    .then(data => {

        console.log(data);

        dusunLayer = L.geoJSON(data, {

            style: styleDusun,

            onEachFeature: onEachDusun

        }).addTo(map);

        map.fitBounds(dusunLayer.getBounds());

    })

    .catch(error => {

        console.error(error);

    });


// =========================
// Tutup popup jika klik tombol X
// =========================

document.querySelector(".close-btn").addEventListener("click",hidePopup);

</script>

</body>
</html>
