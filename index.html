<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sistem Informasi Perumahan Kota Banda Aceh</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>

body{
    font-family:Poppins,sans-serif;
    background:linear-gradient(135deg,#0f4c81,#1b6ca8);
    color:#fff;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    padding:20px;
}	
.hero{
    max-width:900px;
    width:100%;
    text-align:center;
    padding:40px 20px;
	}
.badge{
	display:inline-block;
	background:rgba(255,255,255,.15);
	padding:8px 16px;
	border-radius:30px;
	backdrop-filter:blur(8px)
	}
h1{
	font-size:3rem;
	margin:20px 0}
.sub{
	font-size:1.1rem;
	opacity:.9;line-height:1.7
	}
.btn{
    display:inline-block;
    margin-top:35px;
    padding:16px 36px;
    border-radius:40px;
    background:#00c2ff;
    color:#fff;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
    min-width:180px;
	}
.btn:hover{
	transform:translateY(-3px);
	box-shadow:0 10px 25px rgba(0,0,0,.25)
	}
footer{
    position:absolute;
    bottom:20px;
    left:0;
    width:100%;
    text-align:center;
    font-size:.9rem;
    opacity:.8;
	}
.brand{
    position:fixed;
    top:20px;
    left:25px;

    display:flex;
    align-items:center;
    gap:12px;

    z-index:999;
}

.brand img{
    width:72px;
    height:72px;
    object-fit:contain;
    background:white;
    border-radius:50%;
    padding:5px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.brand-text{
    display:flex;
    flex-direction:column;
    line-height:1.15;
    color:white;
}

.brand-text span{
    font-size:17px;
    font-weight:600;
}

.brand-text .small{
    font-size:12px;
    font-weight:400;
    letter-spacing:1px;
}
@media (max-width:768px){
.brand{
    top:15px;
    left:15px;
    gap:10px;
}

.brand img{
    width:50px;
    height:50px;
}

.brand-text span{
    font-size:12px;
}

.brand-text .small{
    font-size:9px;
}

.hero{
    padding:100px 20px 40px;
	}

h1{
    font-size:2rem;
    line-height:1.3;
	}

.sub{
    font-size:1rem;
	}

.badge{
    font-size:.85rem;
	}

.btn{
    width:100%;
    max-width:260px;
	}

footer{
    position:relative;
    bottom:auto;
    margin-top:40px;
	}
	}
</style>
</head>

<body><div class="hero">
<div class="badge">
  <div align="center">🏠 Next Project 2030</div>
</div>
<div class="brand">
    <img src="images/logo_bna.png" alt="Logo Pemerintah Kota Banda Aceh">

    <div class="brand-text">
        <span class="small">DINAS</span>
        <span>PERUMAHAN DAN</span>
        <span>KAWASAN PERMUKIMAN</span>
        <span class="small">KOTA BANDA ACEH</span>
    </div>
</div>
<h1>Sistem Informasi Perumahan<br>Kota Banda Aceh</h1>
<p class="sub">Platform digital untuk pengelolaan data perumahan, kawasan permukiman Kota Banda Aceh.</p>
<a class="btn" href="#">Masuk Sistem</a>
</div>
  <footer>
  © 2026 Pemerintah Kota Banda Aceh • Prototype Landing Page
  </footer>
<p align="center">&nbsp;</p>
</body></html>
